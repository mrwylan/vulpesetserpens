name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build


  # E2E tests are intentionally excluded from CI.
  # Web Audio API analysis in headless Chromium makes each test slow (~10s),
  # and 34 tests × 1 worker exceeds acceptable CI time.
  # Run locally before release: npm run test:e2e
